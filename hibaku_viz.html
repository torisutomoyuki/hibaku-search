<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私の被爆ノート — 証言の全体像</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --border: #e9e9e7;
    --text-primary: #37352f;
    --text-secondary: #787774;
    --text-tertiary: #9b9a97;
    --tag-bg: #f1f0ef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  .page { max-width: 900px; margin: 0 auto; padding: 0 96px 120px; }

  .page-header {
    padding: 80px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .page-icon { font-size: 48px; margin-bottom: 16px; line-height: 1; }

  .page-title {
    font-family: "Noto Serif JP", serif;
    font-size: 2.2rem;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .page-description {
    font-size: 0.88rem;
    color: var(--text-secondary);
    font-weight: 300;
  }

  .section { margin-bottom: 56px; }

  .section-title {
    font-family: "Noto Serif JP", serif;
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .section-desc {
    font-size: 0.82rem;
    color: var(--text-tertiary);
    margin-bottom: 24px;
    font-weight: 300;
  }

  .divider { height: 1px; background: var(--border); margin-bottom: 32px; }

  .bar-container { display: flex; flex-direction: column; gap: 14px; }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeIn 0.4s ease both;
  }

  .bar-label {
    font-size: 0.85rem;
    color: var(--text-primary);
    width: 180px;
    flex-shrink: 0;
    text-align: right;
    font-weight: 300;
    font-family: "Noto Serif JP", serif;
  }

  .bar-track {
    flex: 1;
    height: 10px;
    background: var(--tag-bg);
    border-radius: 5px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: #37352f;
    border-radius: 5px;
    width: 0;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .bar-value {
    font-size: 0.80rem;
    color: var(--text-tertiary);
    width: 56px;
    flex-shrink: 0;
    font-weight: 300;
  }

  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--text-tertiary);
    font-size: 0.88rem;
  }

  .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
  .loading-dots span {
    width: 5px; height: 5px;
    background: var(--text-tertiary);
    border-radius: 50%;
    animation: dot-pulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%,80%,100% { opacity:0.2; transform:scale(0.8); }
    40% { opacity:1; transform:scale(1); }
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateX(-6px); }
    to   { opacity:1; transform:translateX(0); }
  }

  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--text-tertiary);
    text-decoration: none;
    margin-bottom: 32px;
  }
  .nav-link:hover { color: var(--text-secondary); }

  .total-note {
    font-size: 0.82rem;
    color: var(--text-tertiary);
    margin-top: 24px;
    font-weight: 300;
  }

  @media (max-width: 768px) {
    .page { padding: 0 24px 80px; }
    .page-title { font-size: 1.6rem; }
    .page-header { padding: 48px 0 32px; }
    .bar-label { width: 110px; font-size: 0.78rem; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="page-header">
    <div class="page-icon">📊</div>
    <h1 class="page-title">証言の全体像</h1>
    <p class="page-description">1,243人・8,597チャンクの被爆証言を分析する</p>
  </div>

  <a class="nav-link" href="hibaku_search.html">← 証言を探す</a>

  <div id="loading" class="loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p style="margin-top:12px">データを読み込んでいます...</p>
  </div>

  <div id="content" style="display:none">
    <div class="section">
      <div class="section-title">何について語られているか</div>
      <div class="section-desc">12のテーマタグ別チャンク数。1つの証言に複数のテーマが含まれる場合があります。</div>
      <div class="divider"></div>
      <div class="bar-container" id="themeChart"></div>
      <div class="total-note" id="totalNote"></div>
    </div>
  </div>

</div>

<script>
const API = "https://hibaku-search.onrender.com";

async function loadStats() {
  try {
    const res = await fetch(`${API}/stats`);
    const data = await res.json();

    if (data.error) {
      document.getElementById("loading").textContent = "エラー: " + data.error;
      return;
    }

    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";

    renderThemes(data.themes);

  } catch(e) {
    document.getElementById("loading").textContent = "サーバーに接続できません";
  }
}

function renderThemes(themes) {
  const container = document.getElementById("themeChart");
  const entries = Object.entries(themes).sort((a,b) => b[1] - a[1]);
  const max = entries[0][1];
  const total = entries.reduce((s, e) => s + e[1], 0);

  container.innerHTML = entries.map(([label, count], i) => `
    <div class="bar-row" style="animation-delay:${i*0.06}s">
      <div class="bar-label">${label}</div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-${i}"></div>
      </div>
      <div class="bar-value">${count.toLocaleString()} 件</div>
    </div>
  `).join("");

  // アニメーション（少し遅らせてからバーを伸ばす）
  requestAnimationFrame(() => {
    entries.forEach(([label, count], i) => {
      setTimeout(() => {
        const bar = document.getElementById(`bar-${i}`);
        if (bar) bar.style.width = `${(count / max * 100).toFixed(1)}%`;
      }, i * 60);
    });
  });

  document.getElementById("totalNote").textContent =
    `合計 ${total.toLocaleString()} タグ（8,597チャンク中）`;
}

loadStats();
</script>
</body>
</html>
